name: "Chromatic"

# Runs visual regression on every push and PR. Requires CHROMATIC_PROJECT_TOKEN
# to be set in repository Settings → Secrets and variables → Actions.

# Scoped to design-system sources — pushes that only touch the mobile
# prototype (app/) or reference material don't consume Chromatic builds.
on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - ".storybook/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/chromatic.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - ".storybook/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/chromatic.yml"

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Chromatic needs full history to detect baselines.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true
          exitZeroOnChanges: true
