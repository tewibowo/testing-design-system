name: "Chromatic"

# Visual regression for the DESIGN SYSTEM ONLY. Requires CHROMATIC_PROJECT_TOKEN
# to be set in repository Settings → Secrets and variables → Actions.
#
# Deliberately NOT triggered on pull_request: GitHub evaluates PR path filters
# against the ENTIRE PR diff, so a prototype branch that happens to touch any
# design-system file (or root package.json) re-runs Chromatic on EVERY push and
# burns through the snapshot quota. Chromatic now runs only when design-system
# sources land on main, or on demand via workflow_dispatch.
on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - ".storybook/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/chromatic.yml"
  workflow_dispatch:

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Chromatic needs full history to detect baselines.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true
          exitZeroOnChanges: true
