name: Deploy mobile prototype to GitHub Pages

on:
  push:
    branches: [main, claude/straitsx-mobile-prototype-kus0zy]
    paths: ["app/**", "src/**", ".github/workflows/deploy-app.yml"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
        working-directory: app
      - run: npm run build
        working-directory: app
      # Publishing to the gh-pages branch auto-enables GitHub Pages on
      # user repos — no manual Settings step, no Pages admin API needed.
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: app/dist
