<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;">
    <div class="swatch"><div class="chip" style="background:#007D00;height:48px;"></div><div class="name">Positive</div><div class="hex">#007D00</div></div>
    <div class="swatch"><div class="chip" style="background:#DF1312;height:48px;"></div><div class="name">Critical</div><div class="hex">#DF1312</div></div>
    <div class="swatch"><div class="chip" style="background:#F79410;height:48px;"></div><div class="name">Warning</div><div class="hex">#F79410</div></div>
    <div class="swatch"><div class="chip" style="background:#0D69D4;height:48px;"></div><div class="name">Information</div><div class="hex">#0D69D4</div></div>
    <div class="swatch"><div class="chip" style="background:#1B2736;height:48px;"></div><div class="name">Neutral</div><div class="hex">#1B2736</div></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:10px;">
    <div class="swatch"><div class="chip" style="background:#F0F9F4;border:1px solid #B6DDC4;height:36px;"></div><div class="hex">soft + border</div></div>
    <div class="swatch"><div class="chip" style="background:#FDECEC;border:1px solid #F2A89B;height:36px;"></div><div class="hex">&nbsp;</div></div>
    <div class="swatch"><div class="chip" style="background:#FFF5E6;border:1px solid #F7D7A7;height:36px;"></div><div class="hex">&nbsp;</div></div>
    <div class="swatch"><div class="chip" style="background:#EAF2FD;border:1px solid #A8C8F2;height:36px;"></div><div class="hex">&nbsp;</div></div>
    <div class="swatch"><div class="chip" style="background:#F2F4F5;border:1px solid #C6C6C6;height:36px;"></div><div class="hex">&nbsp;</div></div>
  </div>
</body></html>
