<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div class="row" style="gap:10px;">
    <div class="swatch"><div class="chip" style="background:#FFFFFF;border:1px solid #E0E0E0;"></div><div class="name">Surface</div><div class="hex">#FFFFFF</div></div>
    <div class="swatch"><div class="chip" style="background:#F7F7F7;"></div><div class="name">Subtle</div><div class="hex">#F7F7F7</div></div>
    <div class="swatch"><div class="chip" style="background:#F6F7F9;"></div><div class="name">Muted</div><div class="hex">#F6F7F9</div></div>
    <div class="swatch"><div class="chip" style="background:#EBEBEB;"></div><div class="name">Line soft</div><div class="hex">#EBEBEB</div></div>
    <div class="swatch"><div class="chip" style="background:#E0E0E0;"></div><div class="name">Line</div><div class="hex">#E0E0E0</div></div>
    <div class="swatch"><div class="chip" style="background:#C6C6C6;"></div><div class="name">Line strong</div><div class="hex">#C6C6C6</div></div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px;">
    <div class="swatch"><div class="chip" style="background:#121212;"></div><div class="name">fg / body</div><div class="hex">#121212</div></div>
    <div class="swatch"><div class="chip" style="background:#505454;"></div><div class="name">fg-2</div><div class="hex">#505454</div></div>
    <div class="swatch"><div class="chip" style="background:#6B6B6B;"></div><div class="name">fg-3 helper</div><div class="hex">#6B6B6B</div></div>
    <div class="swatch"><div class="chip" style="background:#9D9E9F;"></div><div class="name">fg-4 disabled</div><div class="hex">#9D9E9F</div></div>
  </div>
</body></html>
