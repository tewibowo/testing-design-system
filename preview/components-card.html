<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="background:#F6F7F9;">
  <div style="display:grid;grid-template-columns:1.1fr 0.9fr;gap:14px;">
    <div style="background:#fff;border-radius:8px;border:1px solid #E0E0E0;padding:20px;">
      <div style="font:700 20px/1.3 'Red Hat Display'; color:#002B2A;">Verify Your Identity</div>
      <div style="font:var(--sx-body-m); color:#505454; margin-top:8px;">Complete identity verification for a smooth and secure experience.</div>
      <div style="margin-top:16px;">
        <span style="display:inline-block; padding:4px 12px; border-radius:8px; background:#F0F9F4; border:1px solid #B6DDC4; color:#007D00; font:700 14px/1.2 'Hanken Grotesk';">Verified</span>
      </div>
    </div>
    <div style="background:#054948;border-radius:8px;padding:20px;color:#fff;position:relative;overflow:hidden;">
      <div style="font:700 20px/1.3 'Red Hat Display';">StraitsX OTC Desk</div>
      <div style="font:var(--sx-body-m); margin-top:8px; opacity:0.9;">We offer deep liquidity to institutions and high net-worth individuals. Starting from 50,000 USD.</div>
      <div style="margin-top:14px;">
        <a style="font:700 14px/1 'Red Hat Display';color:#00D37E;text-decoration:none;">Request Quote →</a>
      </div>
      <!-- decorative wave streaks -->
      <svg viewBox="0 0 200 120" style="position:absolute;right:-10px;bottom:-10px;width:140px;opacity:0.85;" fill="none">
        <path d="M0 80 Q60 0 200 30 L200 120 L0 120 Z" fill="#00D37E" opacity="0.18"/>
        <path d="M40 110 Q120 40 220 70" stroke="#00D37E" stroke-width="6" stroke-linecap="round"/>
        <path d="M60 130 Q150 70 230 90" stroke="#00D37E" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
      </svg>
    </div>
  </div>
</body></html>
