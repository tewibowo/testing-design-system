<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:flex;align-items:flex-end;gap:16px;">

    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:8px;height:8px;background:#002B2A;"></div><div class="hex">8</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:12px;height:12px;background:#002B2A;"></div><div class="hex">12</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:16px;height:16px;background:#002B2A;"></div><div class="hex">16</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:24px;height:24px;background:#002B2A;"></div><div class="hex">24</div></div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;"><div style="width:64px;height:64px;background:#002B2A;"></div><div class="hex">64</div></div>
  </div>
  <div style="font:var(--sx-body-s);color:var(--sx-fg-3);margin-top:14px;">4&nbsp;px base grid. Inline gaps live in the 4–16 range; section gaps 24–64.</div>
