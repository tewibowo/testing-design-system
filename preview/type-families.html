<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
    <div>
      <div style="font:700 64px/1 'Red Hat Display'; color:#002B2A; letter-spacing:-0.01em;">Aa</div>
      <div style="font:var(--sx-label-m); margin-top:8px;">Red Hat Display</div>
      <div style="font:var(--sx-body-s); color:var(--sx-fg-3);">Primary · Display, Title, Label (Bold)</div>
      <div style="font:300 16px/1.4 'Red Hat Display'; margin-top:8px;">Light · Regular · <b>Bold</b> · <span style="font-weight:900;">Black</span></div>
    </div>
    <div>
      <div style="font:400 64px/1 'Hanken Grotesk'; color:#002B2A;">Aa</div>
      <div style="font:var(--sx-label-m); margin-top:8px;">Hanken Grotesk</div>
      <div style="font:var(--sx-body-s); color:var(--sx-fg-3);">Secondary · Body, Headline, Label (Hanken)</div>
      <div style="font:400 16px/1.4 'Hanken Grotesk'; margin-top:8px;">Light · Regular · <b>Bold</b> · <span style="font-weight:900;">Black</span></div>
    </div>
  </div>
  <div style="margin-top:18px; padding-top:18px; border-top:1px solid #EBEBEB; display:flex; gap:18px; align-items:baseline;">
    <div style="font:600 28px/1 'Red Hat Mono'; color:#002B2A;">1234567890</div>
    <div>
      <div style="font:var(--sx-label-m);">Red Hat Mono</div>
      <div style="font:var(--sx-body-s); color:var(--sx-fg-3);">Numerals + code · Google Fonts</div>
    </div>
  </div>
</body></html>
