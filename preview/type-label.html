<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px;">
    <div>
      <div style="font:var(--sx-body-s);color:var(--sx-fg-3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">Label · Red Hat Display</div>
      <div style="font:var(--sx-label-l);color:#002B2A;">Label Large 16</div>
      <div style="font:var(--sx-label-m);color:#002B2A;margin-top:4px;">Label Medium 14</div>
      <div style="font:var(--sx-label-s);color:#002B2A;margin-top:4px;">Label Small 12</div>
    </div>
    <div>
      <div style="font:var(--sx-body-s);color:var(--sx-fg-3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;">Label · Hanken Grotesk</div>
      <div style="font:var(--sx-label-l-hk);color:#002B2A;">Label Large 16</div>
      <div style="font:var(--sx-label-m-hk);color:#002B2A;margin-top:4px;">Label Medium 14</div>
      <div style="font:var(--sx-label-s-hk);color:#002B2A;margin-top:4px;">Label Small 12</div>
    </div>
  </div>
  <div style="margin-top:16px;font:var(--sx-body-s);color:var(--sx-fg-3);">Buttons, badges, form labels, tab text. Use the Hanken variant when a section wants a slightly warmer voice.</div>
