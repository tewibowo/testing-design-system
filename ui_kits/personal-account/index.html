<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1440" />
  <title>StraitsX · Personal Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&display=block" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="TopBar.jsx"></script>
  <script type="text/babel" src="EmptyState.jsx"></script>
  <script type="text/babel" src="TransferPanel.jsx"></script>
  <script type="text/babel" src="OtcBanner.jsx"></script>
  <script type="text/babel" src="OnboardingSteps.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [active, setActive] = useState("home");
      const [stepStates, setStepStates] = useState(["done", "active", "todo"]);

      const advance = () => {
        setStepStates(["done", "done", "active"]);
      };

      return (
        <div className="sx-app" data-screen-label="01 Home">
          <Sidebar active={active} onSelect={setActive} />
          <main className="sx-main">
            <div className="sx-main__head">
              <TopBar />
            </div>

            <div className="sx-main__col" style={{ gap: 24 }}>
              <OnboardingSteps stepStates={stepStates} onTakeAssessment={advance} />

              <div className="sx-main__grid">
                <div className="sx-main__col">
                  <TransferPanel />
                </div>
                <div className="sx-main__col">
                  <OtcBanner />
                  <section className="sx-card sx-notif">
                    <div className="sx-notif__title">Notification</div>
                    <EmptyState
                      compact
                      title="No Transaction Found"
                      sub="You don't have any transactions yet."
                    />
                  </section>
                </div>
              </div>

              <div className="sx-footnote">
                XSGD and XIDR are issued by StraitsX.<br />
                "STRAITSX", "XSGD" and "XIDR" and all other URLs, logos and trademarks related to the StraitsX
                Services are either trademarks or registered trademarks of StraitsX or its licensors.<br />
                StraitsX is the trading name of the StraitsX Group of Companies and its affiliated entities.<br />
                Important Risk Warnings Regarding Digital Payment Tokens: <a href="#">Learn More</a>
              </div>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
